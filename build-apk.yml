name: Build XiaoMi APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create app com.xiaomi.app XiaoMi
          cd app
          cordova platform add android@13.0.0 --verbose

      - name: Replace Source Files
        run: |
          if [ -f index.html ]; then cp index.html app/www/index.html; fi
          if [ -f config.xml ]; then cp config.xml app/config.xml; fi
          echo "Source files copied successfully"

      - name: Build APK
        run: |
          cd app
          chmod +x gradlew
          ./gradlew assembleRelease
          echo "Build completed"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XiaoMi-APK
          path: app/platforms/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
